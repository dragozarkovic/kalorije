<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kalorije">
<meta name="theme-color" content="#15140f">
<title>Kalorije</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15140f;
    --bg2:#1d1c15;
    --surface:#22211a;
    --surface2:#2b2a21;
    --line:#36352a;
    --txt:#f4f0e6;
    --muted:#9a978a;
    --faint:#6b685d;
    --kcal:#ff5f20;
    --pro:#38a97b;
    --carb:#5b8def;
    --fat:#f5c24b;
    --over:#ff5d5d;
    --display:'Bricolage Grotesque',-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
    --body:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
    --sat:env(safe-area-inset-top);
    --sab:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:var(--body);
    font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none;}
  body{padding-top:var(--sat);}
  h1,h2,h3{font-family:var(--display);margin:0;letter-spacing:-.02em;}
  button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit;}
  .num{font-family:var(--display);font-variant-numeric:tabular-nums;}

  #app{max-width:540px;margin:0 auto;padding:0 14px calc(28px + var(--sab));}

  /* ---------- Header / status ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 2px 8px;}
  .topbar .date{font-family:var(--display);font-weight:700;font-size:19px;}
  .topbar .date small{display:block;font-family:var(--body);font-weight:500;color:var(--muted);font-size:12px;letter-spacing:.02em;}
  .navbtns{display:flex;gap:8px;}
  .navbtns button{width:38px;height:38px;border-radius:12px;background:var(--surface);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:17px;}
  .navbtns button:active{background:var(--surface2);}

  .status{background:linear-gradient(160deg,var(--bg2),var(--surface));border:1px solid var(--line);
    border-radius:24px;padding:18px 16px 16px;display:flex;gap:16px;align-items:center;}
  .ring-wrap{position:relative;flex:0 0 auto;}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .ring-center .big{font-family:var(--display);font-weight:800;font-size:30px;line-height:1;}
  .ring-center .sub{font-size:11px;color:var(--muted);margin-top:3px;}
  .ring-center .unit{font-size:10px;color:var(--faint);}
  .macros{flex:1;display:flex;flex-direction:column;gap:11px;min-width:0;}
  .macro{display:flex;flex-direction:column;gap:5px;}
  .macro .lab{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;}
  .macro .lab .nm{color:var(--muted);font-weight:600;letter-spacing:.01em;}
  .macro .lab .vl{font-family:var(--display);font-weight:700;font-size:13px;}
  .macro .lab .vl b{color:var(--txt);}
  .macro .lab .vl span{color:var(--faint);font-weight:500;}
  .bar{height:7px;border-radius:6px;background:#000;position:relative;}
  .bar > i{display:block;height:100%;border-radius:6px;transition:width .35s cubic-bezier(.3,.8,.3,1);}
  .bar-over-seg{position:absolute;top:-1px;right:-3px;height:9px;width:11%;background:var(--over);border-radius:0 5px 5px 0;border:1.5px solid var(--bg2);}
  .over-badge{font-size:10px;background:rgba(255,93,93,.18);color:var(--over);padding:1px 5px;border-radius:5px;font-weight:600;margin-left:4px;}

  /* ---------- Section titles ---------- */
  .sec-h{display:flex;align-items:center;justify-content:space-between;margin:22px 4px 10px;}
  .sec-h h2{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
  .sec-h .meta{font-size:12px;color:var(--faint);}

  /* ---------- Today list ---------- */
  .today{display:flex;flex-direction:column;gap:7px;}
  .today .empty{color:var(--faint);font-size:13px;text-align:center;padding:18px;border:1px dashed var(--line);border-radius:16px;}
  .item{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--line);
    border-radius:15px;padding:9px 11px;}
  .item .ic{width:34px;height:34px;border-radius:9px;flex:0 0 auto;object-fit:cover;background:var(--surface2);
    display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;color:var(--muted);font-size:14px;}
  .item .nm{flex:1;min-width:0;}
  .item .nm b{display:block;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .item-macros{display:grid;grid-template-columns:repeat(4,1fr);margin-top:3px;gap:0 3px;}
  .item-macros span{font-size:10.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .m-qty{color:var(--faint);}
  .m-p{color:var(--pro);}
  .m-c{color:var(--carb);}
  .m-f{color:var(--fat);}
  .item .kc{font-family:var(--display);font-weight:700;font-size:15px;color:var(--kcal);}
  .item .kc small{display:block;font-family:var(--body);font-weight:500;font-size:10px;color:var(--faint);text-align:right;}
  .item .del{width:26px;height:26px;border-radius:8px;color:var(--faint);font-size:16px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .item .del:active{background:var(--surface2);color:var(--over);}

  /* ---------- Tabs ---------- */
  .tabs{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 10px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;padding:8px 14px;border-radius:999px;background:var(--surface);border:1px solid var(--line);
    color:var(--muted);font-size:13px;font-weight:600;white-space:nowrap;}
  .tab.active{background:var(--txt);color:var(--bg);border-color:var(--txt);}

  /* ---------- Food grid ---------- */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
  .food{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:8px;
    display:flex;flex-direction:column;gap:6px;position:relative;transition:transform .08s;}
  .food:active{transform:scale(.95);background:var(--surface2);}
  .food .ph{width:100%;aspect-ratio:1;border-radius:12px;background:var(--surface2);overflow:hidden;
    display:flex;align-items:center;justify-content:center;}
  .food .ph img{width:100%;height:100%;object-fit:cover;}
  .food .ph .ph-txt{font-family:var(--display);font-weight:800;font-size:24px;color:var(--faint);}
  .food .fnm{font-size:12.5px;font-weight:600;line-height:1.15;text-align:center;min-height:29px;
    display:flex;align-items:center;justify-content:center;}
  .food .fkc{font-family:var(--display);font-weight:700;font-size:12px;color:var(--kcal);text-align:center;}
  .food .fkc span{color:var(--faint);font-family:var(--body);font-weight:500;}
  .food .fav{position:absolute;top:5px;left:5px;width:24px;height:24px;border-radius:8px;
    background:rgba(0,0,0,.38);font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--faint);}
  .food .fav.on{color:#ff6b81;}
  .food .edit{position:absolute;top:5px;right:5px;width:24px;height:24px;border-radius:8px;background:rgba(0,0,0,.45);
    color:var(--txt);font-size:13px;display:flex;align-items:center;justify-content:center;opacity:.85;}
  .food.add{align-items:center;justify-content:center;border-style:dashed;color:var(--muted);min-height:120px;}
  .food.add .plus{font-family:var(--display);font-size:34px;font-weight:500;line-height:.7;}
  .food.add .lbl{font-size:11px;margin-top:6px;}

  /* ---------- Chart ---------- */
  .chart-card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:14px 12px 8px;}
  .chart-chips{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .chip{padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;background:var(--surface2);color:var(--muted);border:1px solid transparent;}
  .chip.active{color:var(--bg);}
  #chart{width:100%;display:block;}
  .chart-legend{display:flex;justify-content:space-between;font-size:11px;color:var(--faint);margin-top:4px;padding:0 2px;}

  /* ---------- Bottom actions ---------- */
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;}
  .act{padding:15px;border-radius:18px;background:var(--surface);border:1px solid var(--line);
    font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;}
  .act:active{background:var(--surface2);}
  .act.full{grid-column:1/-1;}

  /* ---------- Modal ---------- */
  .ov{position:fixed;inset:0;background:rgba(5,5,3,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    z-index:50;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
  .ov.show{opacity:1;pointer-events:auto;}
  .sheet{background:var(--bg2);border:1px solid var(--line);border-bottom:none;border-radius:26px 26px 0 0;
    width:100%;max-width:540px;max-height:92vh;overflow-y:auto;padding:8px 18px calc(24px + var(--sab));
    transform:translateY(20px);transition:transform .25s cubic-bezier(.3,.9,.3,1);-webkit-overflow-scrolling:touch;}
  .ov.show .sheet{transform:translateY(0);}
  .grab-row{display:flex;align-items:center;justify-content:center;position:relative;padding:8px 0 14px;}
  .grab{width:38px;height:5px;border-radius:3px;background:var(--line);}
  .sheet-close{position:absolute;right:0;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:12px;background:var(--surface2);color:var(--muted);font-size:19px;display:flex;align-items:center;justify-content:center;}
  .sheet h2{font-size:21px;font-weight:800;margin-bottom:4px;}
  .sheet .desc{color:var(--muted);font-size:13px;margin-bottom:16px;}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px;letter-spacing:.02em;}
  .inp{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:12px 13px;
    color:var(--txt);font-size:16px;font-family:var(--body);}
  .inp:focus{outline:none;border-color:var(--kcal);}
  select.inp{appearance:none;-webkit-appearance:none;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .row4{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}

  .btn{width:100%;padding:15px;border-radius:14px;font-size:15px;font-weight:700;font-family:var(--display);
    background:var(--txt);color:var(--bg);}
  .btn:active{opacity:.85;}
  .btn.ghost{background:var(--surface);color:var(--txt);border:1px solid var(--line);}
  .btn.kcal{background:var(--kcal);color:#1a1206;}
  .btn.danger{background:transparent;color:var(--over);border:1px solid var(--over);}
  .btn-row{display:flex;gap:10px;margin-top:6px;}
  .btn-row .btn{flex:1;}

  /* qty modal */
  .qty-hero{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:6px;}
  .qty-hero .qph{width:74px;height:74px;border-radius:18px;overflow:hidden;background:var(--surface2);
    display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:30px;color:var(--faint);}
  .qty-hero .qph img{width:100%;height:100%;object-fit:cover;}
  .qty-hero h2{text-align:center;}
  .qty-val{text-align:center;margin:14px 0 4px;}
  .qty-val .n{font-family:var(--display);font-weight:800;font-size:48px;line-height:1;}
  .qty-val .u{color:var(--muted);font-size:15px;margin-left:4px;}
  .qty-pills{display:flex;justify-content:center;gap:8px;margin:14px 0;}
  .qty-pills button{flex:1;max-width:74px;padding:13px 0;border-radius:13px;background:var(--surface);border:1px solid var(--line);
    font-family:var(--display);font-weight:700;font-size:15px;}
  .qty-pills button:active{background:var(--surface2);}
  .qty-pills button.plus{color:var(--pro);}
  .qty-pills button.minus{color:var(--over);}
  .qty-macros{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0;text-align:center;}
  .qty-macros .qm{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:10px 4px;}
  .qty-macros .qm .v{font-family:var(--display);font-weight:700;font-size:17px;}
  .qty-macros .qm .l{font-size:10px;color:var(--faint);margin-top:2px;}

  .img-picker{display:flex;gap:8px;margin-bottom:8px;}
  .img-picker button{flex:1;padding:11px 6px;border-radius:12px;background:var(--surface);border:1px solid var(--line);
    font-size:12px;font-weight:600;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;}
  .img-picker button .i{font-size:18px;}
  .img-prev{width:84px;height:84px;border-radius:16px;background:var(--surface);border:1px solid var(--line);
    overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:11px;margin:0 auto 12px;text-align:center;}
  .img-prev img{width:100%;height:100%;object-fit:cover;}

  .scan-box{background:linear-gradient(150deg,rgba(255,138,61,.12),rgba(91,141,239,.1));border:1px solid var(--line);
    border-radius:16px;padding:13px;margin-bottom:16px;}
  .scan-box p{margin:0 0 10px;font-size:12.5px;color:var(--muted);line-height:1.4;}
  .scan-box .btn{background:var(--surface2);color:var(--txt);border:1px solid var(--line);font-size:14px;}
  .scan-status{font-size:12px;margin-top:8px;color:var(--muted);text-align:center;min-height:16px;}
  .scan-status.err{color:var(--over);}
  .scan-status.ok{color:var(--pro);}

  .pct-warn{font-size:12px;color:var(--over);margin-top:-6px;margin-bottom:10px;display:none;}
  .hint{font-size:11.5px;color:var(--faint);margin-top:6px;line-height:1.4;}
  .tabman{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px;}
  .tabman .t{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);
    border-radius:999px;padding:7px 8px 7px 12px;font-size:13px;}
  .tabman .t button{color:var(--faint);font-size:15px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;}
  .divider{height:1px;background:var(--line);margin:18px 0;}
  .danger-zone{margin-top:6px;}
  input[type=file]{display:none;}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--kcal);
    border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .toast{position:fixed;bottom:calc(24px + var(--sab));left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--txt);color:var(--bg);padding:11px 18px;border-radius:999px;font-size:13px;font-weight:600;
    z-index:90;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #cropper{position:fixed;inset:0;background:#000;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px;}
  #cropper canvas{border-radius:18px;border:2px solid rgba(255,255,255,.18);touch-action:none;display:block;}
  #cropper .crop-hint{color:rgba(255,255,255,.45);font-size:13px;font-family:var(--body);}
  #cropper .crop-btns{display:flex;gap:12px;width:100%;}
  #cropper .crop-btns button{flex:1;padding:15px;border-radius:14px;font-family:var(--display);font-weight:700;font-size:15px;border:none;cursor:pointer;}
  #cropper .crop-cancel{background:rgba(255,255,255,.12);color:#fff;}
  #cropper .crop-confirm{background:var(--kcal);color:#1a1206;}
  .wk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px;}
  .wk-tile{background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:12px 6px;
    display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;cursor:pointer;}
  .wk-tile:active{transform:scale(.95);}
  .wk-tile.sel{border-color:var(--pro);background:rgba(70,211,154,.13);}
  .wk-tile .we{font-size:30px;line-height:1;}
  .wk-tile .wn{font-size:11.5px;font-weight:600;color:var(--muted);}
  .wk-tile.sel .wn{color:var(--pro);}
  .meal-group{background:var(--surface);border:1px solid var(--line);border-radius:15px;overflow:hidden;display:flex;flex-direction:column;}
  .meal-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 11px;border-bottom:1px solid var(--line);background:var(--bg2);}
  .meal-time-btn{font-size:11px;font-weight:600;color:var(--muted);background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:4px 8px;}
  .meal-item{border-radius:0!important;border:none!important;border-top:1px solid var(--line)!important;background:transparent!important;}
  .gl-pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;cursor:pointer;border:none;}
  .gl-low{background:rgba(56,169,123,.22);color:var(--pro);}
  .gl-mid{background:rgba(245,194,75,.22);color:var(--fat);}
  .gl-high{background:rgba(255,93,93,.22);color:var(--over);}
  .nm-row{display:flex;align-items:baseline;gap:6px;overflow:hidden;}
  .nm-row b{overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1;}
  .item-time{font-size:10px;color:var(--faint);cursor:pointer;flex-shrink:0;white-space:nowrap;user-select:none;}
  .item-time:active{color:var(--kcal);}
  .time-picker{display:flex;gap:14px;align-items:center;justify-content:center;margin:20px 0 24px;}
  .tp-wrap{position:relative;}
  .tp-wrap::before,.tp-wrap::after{content:'';position:absolute;left:0;right:0;height:44px;z-index:2;pointer-events:none;}
  .tp-wrap::before{top:0;background:linear-gradient(to bottom,var(--bg2) 40%,transparent);}
  .tp-wrap::after{bottom:0;background:linear-gradient(to top,var(--bg2) 40%,transparent);}
  .tp-col{height:132px;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;width:72px;border-radius:14px;background:var(--surface);border:1px solid var(--line);position:relative;}
  .tp-col::-webkit-scrollbar{display:none;}
  .tp-item{height:44px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:26px;font-weight:700;scroll-snap-align:center;color:var(--faint);}
  .tp-sep{font-family:var(--display);font-size:32px;font-weight:800;color:var(--muted);line-height:1;}
  .tp-sel-line{position:absolute;top:50%;left:6px;right:6px;height:44px;transform:translateY(-50%);border-top:1px solid var(--line);border-bottom:1px solid var(--line);pointer-events:none;z-index:3;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="date" id="dateLbl">Danas<small id="dateSub"></small></div>
    <div class="navbtns">
      <button id="prevDay">‹</button>
      <button id="todayBtn">•</button>
      <button id="nextDay">›</button>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status">
    <div class="ring-wrap">
      <svg width="116" height="116" viewBox="0 0 116 116" id="kcalRing">
        <circle cx="58" cy="58" r="50" fill="none" stroke="#000" stroke-width="11"/>
        <circle cx="58" cy="58" r="50" fill="none" stroke="var(--kcal)" stroke-width="11" stroke-linecap="round"
          id="kcalArc" transform="rotate(-90 58 58)" stroke-dasharray="314" stroke-dashoffset="314"/>
      </svg>
      <div class="ring-center">
        <div class="big num" id="kcalNow">0</div>
        <div class="sub">od <span id="kcalTgt">2000</span></div>
        <div class="unit">kcal</div>
        <div class="unit" id="kcalBurned" style="display:none;color:var(--pro);margin-top:2px;font-size:9px;"></div>
      </div>
    </div>
    <div class="macros" id="macroBars"></div>
  </div>

  <!-- TODAY -->
  <div class="sec-h"><h2>Uneto danas</h2><div class="meta" id="todayCount"></div></div>
  <div class="today" id="todayList"></div>

  <!-- FOODS -->
  <div class="sec-h"><h2>Namirnice</h2><div class="meta">tap = dodaj</div></div>
  <div class="tabs" id="tabs"></div>
  <div class="grid" id="grid"></div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="act" id="openSettings">⚙︎ Podešavanja</button>
    <button class="act" id="openAddFood">＋ Nova namirnica</button>
    <button class="act full" id="openWorkout">💪 Dodaj trening</button>
  </div>

  <!-- CHART -->
  <div class="sec-h"><h2>Poslednjih 14 dana</h2></div>
  <div class="chart-card">
    <div class="chart-chips" id="chartChips"></div>
    <svg id="chart" viewBox="0 0 340 170" preserveAspectRatio="none"></svg>
    <div class="chart-legend"><span id="chartFrom"></span><span>cilj — — —</span><span id="chartTo"></span></div>
  </div>
</div>

<!-- ===== MODAL ROOT ===== -->
<div class="ov" id="ov"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<!-- hidden file inputs -->
<input type="file" id="fileGallery" accept="image/*">
<input type="file" id="fileCamera" accept="image/*" capture="environment">
<input type="file" id="fileScan" accept="image/*" capture="environment">
<input type="file" id="fileImport" accept="application/json,.json">

<script>
/* ============================================================
   KALORIJE — lični PWA tracker  (single file, IndexedDB)
   ============================================================ */
const $ = s => document.querySelector(s);
const DEFAULT_TABS = ["Moje","Meso i riba","Mleko i sir","Žitarice i hleb","Povrće","Voće","Orašasti i masti","Napici","Slatkiši","Sve"];
const DEFAULT_SETTINGS = {
  calorieTarget: 2000, proteinPct: 30, carbsPct: 40, fatPct: 30,
  tabs: DEFAULT_TABS.slice(), apiKey: "", model: "claude-3-5-sonnet-20241022",
  workouts: [{name:"Šetnja",emoji:"🚶"},{name:"Fudbal",emoji:"⚽"},{name:"Bicikl",emoji:"🚴"},{name:"Sobni bicikl",emoji:"🚲"},{name:"Stoni tenis",emoji:"🏓"},{name:"Plivanje",emoji:"🏊"}],
  glTarget:80, mealWindow:45
};
const MACRO = { protein:{c:"var(--pro)",l:"Proteini",k:4}, carbs:{c:"var(--carb)",l:"Ugljeni h.",k:4}, fat:{c:"var(--fat)",l:"Masti",k:9} };

let state = { settings:{...DEFAULT_SETTINGS}, foods:[], log:[], date:todayKey(), activeTab:"Moje", chartMetric:"all" };

/* ---------- date helpers ---------- */
function todayKey(d=new Date()){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function shiftDate(key,days){ const [y,m,d]=key.split("-").map(Number); const dt=new Date(y,m-1,d); dt.setDate(dt.getDate()+days); return todayKey(dt); }
function prettyDate(key){
  const [y,m,d]=key.split("-").map(Number); const dt=new Date(y,m-1,d);
  const days=["nedelja","ponedeljak","utorak","sreda","četvrtak","petak","subota"];
  const mon=["jan","feb","mar","apr","maj","jun","jul","avg","sep","okt","nov","dec"];
  return {wd:days[dt.getDay()], full:d+". "+mon[m-1]+" "+y};
}

/* ---------- IndexedDB ---------- */
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open("kalorije",1);
    r.onupgradeneeded=e=>{ const d=e.target.result;
      if(!d.objectStoreNames.contains("foods")) d.createObjectStore("foods",{keyPath:"id"});
      if(!d.objectStoreNames.contains("log")) d.createObjectStore("log",{keyPath:"id",autoIncrement:true});
      if(!d.objectStoreNames.contains("settings")) d.createObjectStore("settings",{keyPath:"k"});
    };
    r.onsuccess=e=>{db=e.target.result;res();}; r.onerror=e=>rej(e);
  });
}
function tx(store,mode="readonly"){ return db.transaction(store,mode).objectStore(store); }
function getAll(store){ return new Promise(r=>{ const q=tx(store).getAll(); q.onsuccess=()=>r(q.result||[]); q.onerror=()=>r([]); }); }
function put(store,val){ return new Promise(r=>{ const q=tx(store,"readwrite").put(val); q.onsuccess=()=>r(q.result); }); }
function del(store,key){ return new Promise(r=>{ const q=tx(store,"readwrite").delete(key); q.onsuccess=()=>r(); }); }
function clearStore(store){ return new Promise(r=>{ const q=tx(store,"readwrite").clear(); q.onsuccess=()=>r(); }); }

async function loadSettings(){
  const all=await getAll("settings"); const s=all.find(x=>x.k==="app");
  if(s) state.settings={...DEFAULT_SETTINGS, ...s.v};
  if(!Array.isArray(state.settings.tabs)||!state.settings.tabs.length) state.settings.tabs=DEFAULT_TABS.slice();
  if(!Array.isArray(state.settings.workouts)||!state.settings.workouts.length) state.settings.workouts=DEFAULT_SETTINGS.workouts.slice();
}
async function saveSettings(){ await put("settings",{k:"app", v:state.settings}); }
function migrateTabs(tabs){
  let t=tabs.map(x=>x==="Moji obroci"?"Moje":x);
  const mi=t.indexOf("Moje");
  if(mi>0){t.splice(mi,1);t.unshift("Moje");}else if(mi===-1) t.unshift("Moje");
  const si=t.indexOf("Sve");
  if(si!==-1&&si!==t.length-1){t.splice(si,1);t.push("Sve");}else if(si===-1) t.push("Sve");
  return t;
}

/* ---------- seed data on first run ---------- */
async function maybeSeed(){
  const f=await getAll("foods");
  if(f.length) return;
  const seed=[
    ["Jaje (kuvano)","Meso i riba",155,13,1.1,11,50,"🥚",0],
    ["Pileća prsa","Meso i riba",165,31,0,3.6,150,"🍗",0],
    ["Grčki jogurt","Mleko i sir",59,10,3.6,0.4,170,"🥛",11],
    ["Hleb (integralni)","Žitarice i hleb",247,9,41,3.4,40,"🍞",55],
    ["Banana","Voće",89,1.1,23,0.3,120,"🍌",52],
    ["Badem","Orašasti i masti",579,21,22,50,30,"🥜",15],
  ];
  for(const [name,tab,kcal,p,c,fat,qty,emo,gi] of seed){
    await put("foods",{ id:uid(), name, tab, emoji:emo, img:null,
      per100:{kcal,protein:p,carbs:c,fat}, defaultQty:qty, gi });
  }
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function parseNum(v){ return parseFloat(String(v).replace(",",".").replace(/[^\d.-]/g,""))||0; }

/* ============================================================
   COMPUTE
   ============================================================ */
function macroTargets(burned=0){
  const s=state.settings, c=s.calorieTarget+(burned||0);
  return { kcal:c, protein:Math.round(c*s.proteinPct/100/4), carbs:Math.round(c*s.carbsPct/100/4), fat:Math.round(c*s.fatPct/100/9) };
}
function dayEntries(key=state.date){ return state.log.filter(e=>e.date===key); }
function dayTotals(key=state.date){
  const t={kcal:0,protein:0,carbs:0,fat:0,burned:0};
  for(const e of dayEntries(key)){
    if(e.isWorkout){ t.burned+=e.kcal; }
    else{ t.kcal+=e.kcal; t.protein+=e.protein; t.carbs+=e.carbs; t.fat+=e.fat; }
  }
  for(const k in t) t[k]=Math.round(t[k]);
  return t;
}
function scaleFood(food,qty){
  const f=qty/100;
  return { kcal:food.per100.kcal*f, protein:food.per100.protein*f, carbs:food.per100.carbs*f, fat:food.per100.fat*f };
}
function formatTime(ts){ const d=new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function groupIntoMeals(entries){
  const food=entries.filter(e=>!e.isWorkout).sort((a,b)=>a.ts-b.ts);
  if(!food.length) return [];
  const win=(state.settings.mealWindow||45)*60000;
  const meals=[]; let cur=[food[0]];
  for(let i=1;i<food.length;i++){
    if(food[i].ts-food[i-1].ts<=win) cur.push(food[i]);
    else{ meals.push(cur); cur=[food[i]]; }
  }
  meals.push(cur);
  return meals;
}
function mealGL(entries){
  let rawGL=0;
  entries.forEach(e=>{ const food=state.foods.find(f=>f.id===e.foodId); const gi=food?.gi??55; rawGL+=(gi*(e.carbs||0))/100; });
  const totP=entries.reduce((s,e)=>s+(e.protein||0),0);
  const totF=entries.reduce((s,e)=>s+(e.fat||0),0);
  const corr=Math.max(0.5,1-(totP*0.008+totF*0.010));
  return rawGL*corr;
}
function dayGL(key=state.date){ return Math.round(groupIntoMeals(dayEntries(key)).reduce((s,m)=>s+mealGL(m),0)); }

/* ============================================================
   RENDER
   ============================================================ */
function render(){ renderHeader(); renderStatus(); renderToday(); renderTabs(); renderGrid(); renderChart(); }

function renderHeader(){
  const isToday=state.date===todayKey();
  const p=prettyDate(state.date);
  $("#dateLbl").firstChild.nodeValue = isToday?"Danas":p.wd.charAt(0).toUpperCase()+p.wd.slice(1);
  $("#dateSub").textContent=p.full;
  $("#todayBtn").style.color = isToday ? "var(--kcal)" : "var(--muted)";
}

function renderStatus(){
  const t=dayTotals(), tgt=macroTargets(t.burned);
  const burned=t.burned||0;
  const C=2*Math.PI*50;
  const arc=$("#kcalArc"); const ratio=Math.min(t.kcal/Math.max(tgt.kcal,1),1);
  arc.style.strokeDasharray=C; arc.style.strokeDashoffset=C*(1-ratio);
  arc.style.stroke = t.kcal>tgt.kcal ? "var(--over)" : "var(--kcal)";
  $("#kcalNow").textContent=t.kcal;
  $("#kcalTgt").textContent=tgt.kcal;
  const be=$("#kcalBurned");
  if(burned>0){be.textContent=`💪 +${burned} kcal`;be.style.display='block';}
  else{be.style.display='none';}
  const wrap=$("#macroBars"); wrap.innerHTML="";
  for(const key of ["protein","carbs","fat"]){
    const cur=t[key], tg=tgt[key], pct=Math.min(cur/Math.max(tg,1)*100,100), over=cur>tg;
    const m=MACRO[key];
    const overAmt=over?cur-tg:0;
    const badge=over?`<span class="over-badge">+${overAmt}g</span>`:'';
    const el=document.createElement("div"); el.className="macro";
    if(key==='carbs'){
      const glD=dayGL(), glTgt=state.settings.glTarget||80;
      const glOver=glD>glTgt, glPct=Math.min(glD/Math.max(glTgt,1)*100,100);
      const glBadge=glOver?`<span class="over-badge">+${glD-glTgt}</span>`:'';
      el.innerHTML=`<div class="lab"><span class="nm">${m.l} · GL</span>
        <span class="vl">
          <b${over?' style="color:var(--over)"':''}>${cur}</b><span> / ${tg}g</span>${badge}
          <span style="color:var(--faint);margin:0 3px">·</span>
          <b${glOver?' style="color:var(--over)"':''}>${glD}</b><span> / ${glTgt}</span>${glBadge}
        </span></div>
        <div class="bar" style="margin-bottom:3px"><i style="width:${Math.min(pct,100)}%;background:${m.c}${over?';border-radius:6px 0 0 6px':''}"></i>${over?'<span class="bar-over-seg"></span>':''}</div>
        <div class="bar"><i style="width:${Math.min(glPct,100)}%;background:${m.c};opacity:.42${glOver?';border-radius:6px 0 0 6px':''}"></i>${glOver?'<span class="bar-over-seg"></span>':''}</div>`;
    } else {
      el.innerHTML=`<div class="lab"><span class="nm">${m.l}</span>
        <span class="vl"><b${over?' style="color:var(--over)"':''}>${cur}</b><span> / ${tg} g</span>${badge}</span></div>
        <div class="bar"><i style="width:${Math.min(pct,100)}%;background:${m.c}${over?';border-radius:6px 0 0 6px':''}"></i>${over?'<span class="bar-over-seg"></span>':''}</div>`;
    }
    wrap.appendChild(el);
  }
}

function renderToday(){
  const list=$("#todayList"); const allE=dayEntries(); list.innerHTML="";
  const cnt=allE.length;
  $("#todayCount").textContent=cnt?(cnt+(cnt===1?" stavka":" stavki")):"";
  if(!cnt){ list.innerHTML=`<div class="empty">Još ništa nije uneto. Tapni namirnicu ispod.</div>`; return; }
  const workouts=allE.filter(e=>e.isWorkout).sort((a,b)=>a.ts-b.ts);
  const meals=groupIntoMeals(allE);
  const chunks=[];
  meals.forEach(m=>chunks.push({type:'meal',entries:m,ts:m[0].ts}));
  workouts.forEach(w=>chunks.push({type:'workout',entry:w,ts:w.ts}));
  chunks.sort((a,b)=>a.ts-b.ts);
  chunks.forEach(chunk=>{
    if(chunk.type==='workout'){
      const e=chunk.entry; const wk=e.kcal||0;
      const wP=(wk*0.05/4).toFixed(1),wC=(wk*0.45/4).toFixed(1),wF=(wk*0.50/9).toFixed(1);
      const row=document.createElement("div"); row.className="item";
      row.innerHTML=`<div class="ic">${e.workoutEmoji||'💪'}</div>
        <div class="nm"><b>${e.workoutName||e.name}</b>
          <div class="item-macros">
            <span class="m-qty">trening</span><span class="m-p">P: -${wP}g</span>
            <span class="m-c">UH: -${wC}g</span><span class="m-f">M: -${wF}g</span>
          </div></div>
        <div class="kc" style="color:var(--pro)">-${Math.round(e.kcal)}<small>kcal</small></div>
        <button class="del" data-id="${e.id}">✕</button>`;
      row.querySelector(".del").onclick=async()=>{ await del("log",e.id); state.log=state.log.filter(x=>x.id!==e.id); render(); };
      list.appendChild(row);
    } else {
      const entries=chunk.entries;
      const gl=Math.round(mealGL(entries));
      const mKcal=Math.round(entries.reduce((s,e)=>s+e.kcal,0));
      const glC=gl<10?'gl-low':gl<20?'gl-mid':'gl-high';
      const card=document.createElement("div"); card.className="meal-group";
      const hdr=document.createElement("div"); hdr.className="meal-hdr";
      hdr.innerHTML=`<button class="meal-time-btn">⏱ ${formatTime(entries[0].ts)}</button>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;color:var(--faint)">${mKcal} kcal</span>
          <button class="gl-pill ${glC}">GL ${gl}</button>
        </div>`;
      // meal time is display only – per-item time edit below
      hdr.querySelector(".gl-pill").onclick=()=>openGLDetail(entries);
      card.appendChild(hdr);
      entries.forEach(e=>{
        const food=state.foods.find(f=>f.id===e.foodId);
        const icon=food&&food.img?`<img class="ic" src="${food.img}">`
          :`<div class="ic">${food&&food.emoji?food.emoji:(e.name[0]||"?")}</div>`;
        const p=(e.protein||0),c=(e.carbs||0),f=(e.fat||0);
        const row=document.createElement("div"); row.className="item meal-item";
        row.innerHTML=`${icon}
          <div class="nm">
            <div class="nm-row"><b>${e.name}</b><span class="item-time">⏱ ${formatTime(e.ts)}</span></div>
            <div class="item-macros">
              <span class="m-qty">${e.qty}g</span><span class="m-p">P: ${p.toFixed(1)}g</span>
              <span class="m-c">UH: ${c.toFixed(1)}g</span><span class="m-f">M: ${f.toFixed(1)}g</span>
            </div>
          </div>
          <div class="kc">${Math.round(e.kcal)}<small>kcal</small></div>
          <button class="del" data-id="${e.id}">✕</button>`;
        row.querySelector(".del").onclick=async()=>{ await del("log",e.id); state.log=state.log.filter(x=>x.id!==e.id); render(); };
        row.querySelector(".item-time").onclick=e2=>{ e2.stopPropagation(); openEditItemTime(e); };
        card.appendChild(row);
      });
      list.appendChild(card);
    }
  });
}
function openEditItemTime(entry){
  const t=new Date(entry.ts);
  const curH=t.getHours();
  const curM=Math.round(t.getMinutes()/5)*5%60;
  const m5=[0,5,10,15,20,25,30,35,40,45,50,55];
  const pad=n=>String(n).padStart(2,'0');
  const hItems='<div class="tp-item" aria-hidden="true"></div>'+
    Array.from({length:24},(_,i)=>`<div class="tp-item">${pad(i)}</div>`).join('')+
    '<div class="tp-item" aria-hidden="true"></div>';
  const mItems='<div class="tp-item" aria-hidden="true"></div>'+
    m5.map(m=>`<div class="tp-item">${pad(m)}</div>`).join('')+
    '<div class="tp-item" aria-hidden="true"></div>';
  openSheet(`<h2>Promeni vreme</h2>
    <div class="desc" style="margin-bottom:0">${entry.name}</div>
    <div class="time-picker">
      <div class="tp-wrap"><div class="tp-col" id="tpH">${hItems}</div><div class="tp-sel-line"></div></div>
      <div class="tp-sep">:</div>
      <div class="tp-wrap"><div class="tp-col" id="tpM">${mItems}</div><div class="tp-sel-line"></div></div>
    </div>
    <div class="hint" style="margin-top:-12px;margin-bottom:16px;text-align:center">Skok na 5 minuta · skroluj da promeniš</div>
    <div class="btn-row">
      <button class="btn ghost" onclick="closeSheet()">Otkaži</button>
      <button class="btn kcal" id="itemTimeSave">Sačuvaj</button>
    </div>`);
  const tpH=document.getElementById('tpH');
  const tpM=document.getElementById('tpM');
  const mIdx=m5.indexOf(curM); 
  requestAnimationFrame(()=>{
    tpH.scrollTop=curH*44;
    tpM.scrollTop=Math.max(0,mIdx)*44;
  });
  document.getElementById('itemTimeSave').onclick=async()=>{
    const nH=Math.max(0,Math.min(23,Math.round(tpH.scrollTop/44)));
    const nMIdx=Math.max(0,Math.min(11,Math.round(tpM.scrollTop/44)));
    const nM=m5[nMIdx];
    const old=new Date(entry.ts);
    entry.ts=new Date(old.getFullYear(),old.getMonth(),old.getDate(),nH,nM,0,0).getTime();
    await put("log",entry);
    const i=state.log.findIndex(x=>x.id===entry.id); if(i>=0) state.log[i]=entry;
    closeSheet(); render(); toast(`Vreme promenjeno na ${pad(nH)}:${pad(nM)}`);
  };
}
function openGLDetail(entries){
  const tgt=state.settings.glTarget||80;
  let rows=''; let rawGL=0;
  entries.forEach(e=>{
    const food=state.foods.find(f=>f.id===e.foodId); const gi=food?.gi??55;
    const gl=(gi*(e.carbs||0)/100); rawGL+=gl;
    rows+=`<tr><td style="padding:5px 0">${e.name}</td>
      <td style="color:var(--faint);text-align:right;padding:5px 0;white-space:nowrap">GI ${gi}</td>
      <td style="color:var(--carb);text-align:right;padding:5px 0;white-space:nowrap">UH ${(e.carbs||0).toFixed(1)}g</td>
      <td style="font-weight:700;text-align:right;padding:5px 0;white-space:nowrap">GL ${gl.toFixed(1)}</td></tr>`;
  });
  const totP=entries.reduce((s,e)=>s+(e.protein||0),0);
  const totF=entries.reduce((s,e)=>s+(e.fat||0),0);
  const corr=Math.max(0.5,1-(totP*0.008+totF*0.010));
  const effGL=Math.round(rawGL*corr);
  openSheet(`<h2>GL računica</h2>
    <div class="desc">Glikemijsko opterećenje obroka</div>
    <table style="width:100%;font-size:13px;border-collapse:collapse">${rows}
      <tr style="border-top:1px solid var(--line)">
        <td colspan="3" style="color:var(--muted);padding:8px 0 4px">Sirovi GL</td>
        <td style="font-weight:700;text-align:right;padding:8px 0 4px">${rawGL.toFixed(1)}</td></tr>
    </table>
    <div style="background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:12px;margin:12px 0;font-size:12.5px;color:var(--muted);line-height:1.7">
      Korekcija: ${totP.toFixed(0)}g P × 0.008 + ${totF.toFixed(0)}g M × 0.010 = ${(1-corr).toFixed(3)}<br>
      Faktor: <b style="color:var(--txt)">${corr.toFixed(2)}</b><br>
      <span style="color:var(--txt);font-weight:700">Efektivni GL = ${rawGL.toFixed(1)} × ${corr.toFixed(2)} = <span style="color:var(--carb)">${effGL}</span></span>
    </div>
    <div style="font-size:12px;color:var(--faint)">Dnevni GL target: <b style="color:var(--txt)">${tgt}</b></div>
    <div class="btn-row" style="margin-top:16px"><button class="btn ghost" onclick="closeSheet()">Zatvori</button></div>`);
}

function renderTabs(){
  const tabs=$("#tabs"); tabs.innerHTML="";
  state.settings.tabs.forEach(name=>{
    const b=document.createElement("button");
    b.className="tab"+(name===state.activeTab?" active":"");
    b.textContent=name;
    b.onclick=()=>{ state.activeTab=name; renderTabs(); renderGrid(); };
    tabs.appendChild(b);
  });
}

function renderGrid(){
  const grid=$("#grid"); grid.innerHTML="";
  let foods;
  if(state.activeTab==="Moje") foods=state.foods.filter(f=>f.favorite);
  else if(state.activeTab==="Sve") foods=state.foods;
  else foods=state.foods.filter(f=>f.tab===state.activeTab);
  foods.forEach(f=>{
    const ph = f.img ? `<div class="ph"><img src="${f.img}"></div>`
      : `<div class="ph"><span class="ph-txt">${f.emoji||f.name[0]}</span></div>`;
    const kc=Math.round(f.per100.kcal*f.defaultQty/100);
    const el=document.createElement("div"); el.className="food";
    el.innerHTML=`${ph}<div class="fnm">${f.name}</div>
      <div class="fkc">${kc} <span>kcal / ${f.defaultQty}g</span></div>
      <button class="fav${f.favorite?' on':''}" data-id="${f.id}">${f.favorite?'♥':'♡'}</button>
      <button class="edit" data-id="${f.id}">✎</button>`;
    el.onclick=ev=>{ if(ev.target.classList.contains("edit")||ev.target.classList.contains("fav")) return; openQty(f); };
    el.querySelector(".edit").onclick=ev=>{ ev.stopPropagation(); openAddFood(f); };
    el.querySelector(".fav").onclick=ev=>{ ev.stopPropagation(); toggleFavorite(f); };
    grid.appendChild(el);
  });
  const add=document.createElement("div"); add.className="food add";
  add.innerHTML=`<div class="plus">+</div><div class="lbl">Nova</div>`;
  add.onclick=()=>openAddFood();
  grid.appendChild(add);
}
async function toggleFavorite(food){
  food.favorite=!food.favorite;
  await put("foods",food);
  const i=state.foods.findIndex(f=>f.id===food.id); if(i>=0) state.foods[i]=food;
  renderGrid();
  toast(food.favorite?"Dodato u Moje":"Uklonjeno iz Moje");
}

/* ---------- 14-day chart ---------- */
const CHART_METRICS=[["all","Sve",""],["kcal","Kalorije","var(--kcal)"],["protein","Proteini","var(--pro)"],["carbs","Ugljeni h.","var(--carb)"],["fat","Masti","var(--fat)"],["gl","GL","var(--carb)"]];
function renderChartChips(){
  const c=$("#chartChips"); c.innerHTML="";
  CHART_METRICS.forEach(([key,lab,col])=>{
    const b=document.createElement("button");
    const on=key===state.chartMetric;
    b.className="chip"+(on?" active":"");
    b.textContent=lab;
    if(on && col) b.style.background=col;
    else if(on){ b.style.background="var(--txt)"; b.style.color="var(--bg)"; }
    b.onclick=()=>{ state.chartMetric=key; renderChartChips(); renderChart(); };
    c.appendChild(b);
  });
}
function renderChart(){
  const svg=$("#chart");
  const W=340,H=170,pl=30,pr=10,pt=16,pb=22;
  const W2=W-pl-pr,H2=H-pt-pb;
  const days=[]; for(let i=13;i>=0;i--) days.push(shiftDate(todayKey(),-i));
  const tgt=macroTargets();
  const xPos=i=>pl+(i/13)*W2;
  let html="";

  if(state.chartMetric==="all"){
    const META=[["kcal","var(--kcal)","Kcal"],["protein","var(--pro)","P"],["carbs","var(--carb)","UH"],["fat","var(--fat)","M"],["gl","var(--carb)","GL"]];
    const dayData=days.map(d=>{const t=dayTotals(d);return{t,tg:macroTargets(t.burned||0)};});
    const glTgtA=state.settings.glTarget||80;
    const maxPct=Math.max(150,
      ...META.filter(([k])=>k!=='gl').flatMap(([k])=>dayData.map(({t,tg})=>tg[k]?Math.round(t[k]/tg[k]*100):0)),
      ...days.map(d=>glTgtA?Math.round(dayGL(d)/glTgtA*100):0));
    const yPos=v=>pt+H2*(1-Math.min(Math.max(v,0),maxPct)/maxPct);
    const ty=yPos(100);
    html+=`<line x1="${pl}" y1="${ty.toFixed(1)}" x2="${(W-pr).toFixed(1)}" y2="${ty.toFixed(1)}" stroke="rgba(255,255,255,.18)" stroke-width="1.5" stroke-dasharray="5 4"/>`;
    html+=`<text x="${(pl-3).toFixed(1)}" y="${(ty+3.5).toFixed(1)}" fill="var(--faint)" font-size="7" text-anchor="end">100%</text>`;
    META.forEach(([k,col,lb],i)=>{
      const lx=(pl+i*55+4).toFixed(1);
      html+=`<circle cx="${lx}" cy="8" r="3" fill="${col}"${k==='gl'?' stroke-dasharray="0"':''}/>`;
      html+=`<text x="${(pl+i*55+10).toFixed(1)}" y="11" fill="var(--muted)" font-size="8">${lb}</text>`;
    });
    META.forEach(([key,col])=>{
      let vals;
      if(key==='gl') vals=days.map(d=>glTgtA?Math.round(dayGL(d)/glTgtA*100):0);
      else vals=dayData.map(({t,tg})=>{const v=t[key];return v>0&&tg[key]?Math.round(v/tg[key]*100):0;});
      const pts=vals.map((v,i)=>({x:xPos(i),y:yPos(v)}));
      const d=pts.map((p,i)=>(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
      const dash=key==='gl'?' stroke-dasharray="5 3"':'';
      html+=`<path d="${d}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".9"${dash}/>`;
      vals.forEach((v,i)=>{
        if(v===0) return;
        const isT=days[i]===state.date;
        html+=`<circle cx="${xPos(i).toFixed(1)}" cy="${yPos(v).toFixed(1)}" r="${isT?4:2}" fill="${col}" opacity="${isT?1:.65}"/>`;
      });
    });
  } else {
    const key=state.chartMetric;
    const col=CHART_METRICS.find(m=>m[0]===key)[2];
    const t=key==='gl'?(state.settings.glTarget||80):(tgt[key]||1);
    const vals=key==='gl'?days.map(d=>dayGL(d)):days.map(d=>dayTotals(d)[key]);
    const maxV=Math.max(t*1.35,...vals,1);
    const yPos=v=>pt+H2*(1-Math.max(v,0)/maxV);
    // fill
    const fp=`M${xPos(0).toFixed(1)},${yPos(0).toFixed(1)} `+vals.map((v,i)=>`L${xPos(i).toFixed(1)},${yPos(v).toFixed(1)}`).join(' ')+` L${xPos(13).toFixed(1)},${yPos(0).toFixed(1)} Z`;
    html+=`<path d="${fp}" fill="${col}" opacity=".07"/>`;
    // dashed target
    const ty=yPos(t);
    html+=`<line x1="${pl}" y1="${ty.toFixed(1)}" x2="${(W-pr).toFixed(1)}" y2="${ty.toFixed(1)}" stroke="${col}" stroke-width="1.5" stroke-dasharray="6 4" opacity=".4"/>`;
    html+=`<text x="${(pl-3).toFixed(1)}" y="${(ty+3.5).toFixed(1)}" fill="var(--faint)" font-size="7" text-anchor="end">${t}</text>`;
    // solid line
    const lp=vals.map((v,i)=>(i===0?'M':'L')+xPos(i).toFixed(1)+','+yPos(v).toFixed(1)).join(' ');
    html+=`<path d="${lp}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    // dots
    vals.forEach((v,i)=>{
      const isT=days[i]===state.date;
      if(v===0&&!isT) return;
      const cx=xPos(i).toFixed(1),cy=yPos(v).toFixed(1);
      if(isT){
        html+=`<circle cx="${cx}" cy="${cy}" r="5" fill="${col}"/>`;
        html+=`<circle cx="${cx}" cy="${cy}" r="8" fill="none" stroke="${col}" stroke-width="1" opacity=".35"/>`;
      } else {
        html+=`<circle cx="${cx}" cy="${cy}" r="2.5" fill="${col}" opacity=".7"/>`;
      }
    });
  }
  // X axis date labels
  days.forEach((d,i)=>{
    if(i%2!==0&&i!==13) return;
    const isT=d===state.date;
    const dd=+d.split('-')[2];
    html+=`<text x="${xPos(i).toFixed(1)}" y="${H-4}" fill="${isT?'var(--txt)':'var(--faint)'}" font-size="${isT?9:8}" text-anchor="middle" font-weight="${isT?600:400}">${dd}.</text>`;
  });
  svg.innerHTML=html;
  const pf=prettyDate(days[0]);
  $("#chartFrom").textContent=pf.full.replace(/ \d{4}$/,"");
  $("#chartTo").textContent="danas";
}

/* ---- image handling ---- */
function compressImage(file,cb){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const size=256; const c=document.createElement("canvas"); c.width=size; c.height=size;
      const ctx=c.getContext("2d");
      const s=Math.min(img.width,img.height); const sx=(img.width-s)/2, sy=(img.height-s)/2;
      ctx.drawImage(img,sx,sy,s,s,0,0,size,size);
      cb(c.toDataURL("image/jpeg",0.82));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function showCropper(srcURL,onDone){
  const cs=Math.min(window.innerWidth-32,window.innerHeight-200,440);
  const div=document.createElement('div'); div.id='cropper';
  div.innerHTML=`<div class="crop-hint">Prevuci i zumiraj pinch-om — kvadrat je isečak</div>
    <canvas width="${cs}" height="${cs}" style="width:${cs}px;height:${cs}px"></canvas>
    <div class="crop-btns" style="max-width:${cs}px">
      <button class="crop-cancel">Otkaži</button>
      <button class="crop-confirm">Iseci ✓</button>
    </div>`;
  document.body.appendChild(div);
  const canvas=div.querySelector('canvas'), ctx=canvas.getContext('2d');
  const img=new Image();
  img.onload=()=>{
    let scale=Math.max(cs/img.width,cs/img.height);
    let tx=(cs-img.width*scale)/2, ty=(cs-img.height*scale)/2;
    function clamp(){
      const ms=Math.max(cs/img.width,cs/img.height); if(scale<ms) scale=ms;
      const w=img.width*scale,h=img.height*scale;
      if(tx>0)tx=0; if(tx+w<cs)tx=cs-w;
      if(ty>0)ty=0; if(ty+h<cs)ty=cs-h;
    }
    function draw(){ ctx.clearRect(0,0,cs,cs); ctx.drawImage(img,tx,ty,img.width*scale,img.height*scale); }
    clamp(); draw();
    let ts={};
    canvas.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches)ts[t.identifier]={x:t.clientX,y:t.clientY};},{passive:false});
    canvas.addEventListener('touchmove',e=>{
      e.preventDefault();
      const pts=Array.from(e.touches);
      if(pts.length===1){
        const t=pts[0],p=ts[t.identifier];
        if(p){tx+=t.clientX-p.x;ty+=t.clientY-p.y;}
      }else if(pts.length===2){
        const[a,b]=pts,pa=ts[a.identifier],pb=ts[b.identifier];
        if(pa&&pb){
          const d0=Math.hypot(pa.x-pb.x,pa.y-pb.y),d1=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
          const r=d1/Math.max(d0,1);
          const rect=canvas.getBoundingClientRect();
          const cx=(a.clientX+b.clientX)/2-rect.left,cy=(a.clientY+b.clientY)/2-rect.top;
          tx=cx+(tx-cx)*r;ty=cy+(ty-cy)*r;scale*=r;
        }
      }
      for(const t of e.changedTouches)ts[t.identifier]={x:t.clientX,y:t.clientY};
      clamp();draw();
    },{passive:false});
    canvas.addEventListener('touchend',e=>{for(const t of e.changedTouches)delete ts[t.identifier];});
    div.querySelector('.crop-confirm').onclick=()=>{
      const out=document.createElement('canvas');out.width=out.height=256;
      const s=256/cs;
      out.getContext('2d').drawImage(img,tx*s,ty*s,img.width*scale*s,img.height*scale*s);
      document.body.removeChild(div);
      onDone(out.toDataURL('image/jpeg',0.82));
    };
    div.querySelector('.crop-cancel').onclick=()=>{document.body.removeChild(div);onDone(null);};
  };
  img.src=srcURL;
}
function readAndCrop(file,done){
  const reader=new FileReader();
  reader.onload=e=>showCropper(e.target.result,url=>{if(url)done(url);});
  reader.readAsDataURL(file);
}

function fileToBase64(file){ return new Promise(res=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.readAsDataURL(file); }); }
async function scanLabel(file){
  const st=$("#scanStatus"); st.className="scan-status"; st.innerHTML=`<span class="spin"></span>Čitam tablicu…`;
  try{
    const b64=await fileToBase64(file);
    const media=file.type||"image/jpeg";
    const prompt="Ovo je nutritivna deklaracija sa prehrambenog proizvoda. Izvuci vrednosti NA 100 g (ili 100 ml). "+
      "Ako su date po porciji a poznat je gramaž porcije, preračunaj na 100 g. Vrati ISKLJUČIVO čist JSON bez ikakvog teksta, "+
      'oblika: {"kcal":<broj>,"protein":<broj>,"carbs":<broj>,"fat":<broj>}. Koristi tačku kao decimalni separator. '+
      "Energiju daj u kcal (ako je samo kJ, podeli sa 4.184).";
    const content=[ {type:"image",source:{type:"base64",media_type:media,data:b64}}, {type:"text",text:prompt} ];
    const data=await callClaude([{role:"user",content}]);
    const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").replace(/```json|```/g,"").trim();
    const m=txt.match(/\{[\s\S]*\}/); if(!m) throw new Error("Nije prepoznata tablica.");
    const r=JSON.parse(m[0]);
    if(r.kcal!=null) $("#fKcal").value=Math.round(r.kcal);
    if(r.protein!=null) $("#fPro").value=r.protein;
    if(r.carbs!=null) $("#fCarb").value=r.carbs;
    if(r.fat!=null) $("#fFat").value=r.fat;
    st.className="scan-status ok"; st.textContent="✓ Popunjeno — proveri vrednosti.";
  }catch(err){
    st.className="scan-status err";
    st.textContent = /401|key|x-api/i.test(String(err)) ? "Greška: unesi Anthropic API ključ u Podešavanjima." : "Greška: "+(err.message||err);
  }
}
async function callClaude(messages){
  const s=state.settings; const useKey=s.apiKey && s.apiKey.trim();
  const headers={"Content-Type":"application/json"};
  const body={ model: useKey ? (s.model||"claude-3-5-sonnet-20241022") : "claude-sonnet-4-20250514", max_tokens:1000, messages };
  if(useKey){ headers["x-api-key"]=s.apiKey.trim(); headers["anthropic-version"]="2023-06-01"; headers["anthropic-dangerous-direct-browser-access"]="true"; }
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers,body:JSON.stringify(body)});
  if(!r.ok){ throw new Error((r.status===401?"401 ":"")+"API "+r.status); }
  return r.json();
}

/* ---- SETTINGS modal ---- */
function openSettings(){
  const s=state.settings;
  openSheet(`
    <h2>Podešavanja</h2>
    <div class="desc">Dnevni cilj i raspodela makronutrijenata.</div>
    <div class="field"><label>Dnevni cilj (kcal)</label>
      <input class="inp" id="sKcal" type="number" inputmode="numeric" value="${s.calorieTarget}"></div>
    <div class="field"><label>Raspodela makroa (%)</label>
      <div class="row4" style="grid-template-columns:repeat(3,1fr)">
        <input class="inp" id="sP" type="number" inputmode="numeric" value="${s.proteinPct}" placeholder="Proteini">
        <input class="inp" id="sC" type="number" inputmode="numeric" value="${s.carbsPct}" placeholder="UH">
        <input class="inp" id="sF" type="number" inputmode="numeric" value="${s.fatPct}" placeholder="Masti">
      </div>
      <div class="pct-warn" id="pctWarn">Zbir procenata nije 100%.</div>
      <div class="hint">P / UH / Masti — gramaži se računaju automatski (4/4/9 kcal/g).</div>
    </div>

    <div class="divider"></div>
    <div class="field"><label>Tabovi (kategorije)</label>
      <div class="tabman" id="tabMan"></div>
      <div style="display:flex;gap:8px">
        <input class="inp" id="newTab" placeholder="Novi tab…">
        <button class="btn ghost" id="addTab" style="width:auto;padding:0 18px">+</button>
      </div>
    </div>

    <div class="divider"></div>
    <div class="field"><label>Treninzi</label>
      <div class="tabman" id="wkMan"></div>
      <div style="display:flex;gap:8px">
        <input class="inp" id="wkEmoji" placeholder="🏃" style="max-width:58px;text-align:center">
        <input class="inp" id="wkName" placeholder="Naziv treninga…">
        <button class="btn ghost" id="addWk" style="width:auto;padding:0 14px">+</button>
      </div>
    </div>

    <div class="divider"></div>
    <div class="row2">
      <div class="field"><label>GL dnevni target</label>
        <input class="inp" id="sGlTarget" type="number" inputmode="numeric" value="${s.glTarget||80}">
        <div class="hint">Low carb ≈ 80, umereno ≈ 100</div></div>
      <div class="field"><label>Prozor obroka (min)</label>
        <input class="inp" id="sMealWindow" type="number" inputmode="numeric" value="${s.mealWindow||45}">
        <div class="hint">Namirnice unete unutar ovog intervala grupišu se u isti obrok</div></div>
    </div>

    <div class="divider"></div>
    <div class="field"><label>Anthropic API ključ (za skeniranje tablica)</label>
      <input class="inp" id="sKey" type="password" value="${s.apiKey||""}" placeholder="sk-ant-…" autocomplete="off"></div>
    <div class="field"><label>Model</label>
      <input class="inp" id="sModel" value="${s.model||"claude-3-5-sonnet-20241022"}"></div>
    <div class="hint" style="margin-bottom:14px">Ključ se čuva samo lokalno na ovom telefonu (u bazi aplikacije).</div>

    <button class="btn kcal" id="sSave">Sačuvaj</button>

    <div class="divider"></div>
    <label style="font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:8px">Bekap</label>
    <div class="btn-row">
      <button class="btn ghost" id="bExport">⬇︎ Izvezi (JSON)</button>
      <button class="btn ghost" id="bImport">⬆︎ Uvezi</button>
    </div>
    <div class="danger-zone">
      <button class="btn danger" id="bReset" style="margin-top:10px">Obriši sve podatke</button>
    </div>
  `);
  renderTabMan();
  renderWorkoutMan();
  const chkPct=()=>{ const sum=(+$("#sP").value)+(+$("#sC").value)+(+$("#sF").value); $("#pctWarn").style.display=sum===100?"none":"block"; };
  ["sP","sC","sF"].forEach(id=>$("#"+id).oninput=chkPct); chkPct();
  $("#addTab").onclick=()=>{ const v=$("#newTab").value.trim(); if(v&&!state.settings.tabs.includes(v)){ state.settings.tabs.push(v); $("#newTab").value=""; renderTabMan(); } };
  $("#addWk").onclick=()=>{
    const nm=$("#wkName").value.trim(), em=$("#wkEmoji").value.trim()||"💪";
    if(nm&&!state.settings.workouts.find(w=>w.name===nm)){
      state.settings.workouts.push({name:nm,emoji:em}); $("#wkName").value=""; $("#wkEmoji").value=""; renderWorkoutMan();
    }
  };
  $("#sSave").onclick=async()=>{
    state.settings.calorieTarget=Math.max(0,Math.round(+$("#sKcal").value||0));
    state.settings.proteinPct=+$("#sP").value||0; state.settings.carbsPct=+$("#sC").value||0; state.settings.fatPct=+$("#sF").value||0;
    state.settings.glTarget=Math.max(0,Math.round(+$("#sGlTarget").value||80)); state.settings.mealWindow=Math.max(5,Math.round(+$("#sMealWindow").value||45));
    state.settings.apiKey=$("#sKey").value.trim(); state.settings.model=$("#sModel").value.trim()||"claude-3-5-sonnet-20241022";
    await saveSettings(); if(!state.settings.tabs.includes(state.activeTab)) state.activeTab="Moje";
    closeSheet(); render(); toast("Sačuvano");
  };
  $("#bExport").onclick=exportData;
  $("#bImport").onclick=()=>$("#fileImport").click();
  $("#bReset").onclick=async()=>{ if(confirm("Obrisati SVE namirnice i istoriju? Ovo se ne može vratiti.")){ await clearStore("foods"); await clearStore("log"); state.foods=[]; state.log=[]; closeSheet(); render(); toast("Obrisano"); } };
}
function renderTabMan(){
  const w=$("#tabMan"); w.innerHTML="";
  state.settings.tabs.forEach((t,i)=>{
    const el=document.createElement("div"); el.className="t";
    el.innerHTML=`<span>${t}</span>`;
    if(t!=="Sve"){ const b=document.createElement("button"); b.textContent="✕";
      b.onclick=()=>{ state.settings.tabs.splice(i,1); renderTabMan(); }; el.appendChild(b); }
    w.appendChild(el);
  });
}
function renderWorkoutMan(){
  const w=$("#wkMan"); if(!w) return; w.innerHTML="";
  state.settings.workouts.forEach((wk,i)=>{
    const el=document.createElement("div"); el.className="t";
    el.innerHTML=`<span>${wk.emoji} ${wk.name}</span>`;
    const b=document.createElement("button"); b.textContent="✕";
    b.onclick=()=>{ state.settings.workouts.splice(i,1); renderWorkoutMan(); }; el.appendChild(b);
    w.appendChild(el);
  });
}

/* ---- backup ---- */
async function exportData(){
  const data={ version:1, exported:new Date().toISOString(),
    settings:state.settings, foods:await getAll("foods"), log:await getAll("log") };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="kalorije-bekap-"+todayKey()+".json"; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000); toast("Bekap izvezen");
}
$("#fileImport").onchange=async e=>{
  const f=e.target.files[0]; e.target.value=""; if(!f) return;
  try{
    const data=JSON.parse(await f.text());
    if(!confirm("Uvezi bekap? Trenutni podaci se zamenjuju.")) return;
    await clearStore("foods"); await clearStore("log");
    if(data.settings){ state.settings={...DEFAULT_SETTINGS,...data.settings}; await saveSettings(); }
    for(const fd of (data.foods||[])) await put("foods",fd);
    for(const lg of (data.log||[])){ delete lg.id; await put("log",lg); }
    state.foods=await getAll("foods"); state.log=await getAll("log");
    closeSheet(); render(); toast("Bekap uvezen");
  }catch(err){ alert("Neispravan fajl: "+err.message); }
};

/* ============================================================
   misc UI
   ============================================================ */
let toastT;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1800); }
$("#prevDay").onclick=()=>{ state.date=shiftDate(state.date,-1); render(); };
$("#nextDay").onclick=()=>{ if(state.date<todayKey()){ state.date=shiftDate(state.date,1); render(); } };
$("#todayBtn").onclick=()=>{ state.date=todayKey(); render(); };
$("#openSettings").onclick=openSettings;
$("#openAddFood").onclick=()=>openAddFood();
$("#openWorkout").onclick=openWorkout;

/* ---- home-screen icon (generated) ---- */
function makeIcon(){
  const c=document.createElement("canvas"); c.width=c.height=180; const x=c.getContext("2d");
  x.fillStyle="#15140f"; x.fillRect(0,0,180,180);
  x.strokeStyle="#ff8a3d"; x.lineWidth=14; x.lineCap="round";
  x.beginPath(); x.arc(90,90,58,-Math.PI/2, Math.PI*0.95); x.stroke();
  x.fillStyle="#f4f0e6"; x.font="700 64px -apple-system,sans-serif"; x.textAlign="center"; x.textBaseline="middle";
  x.fillText("kc",90,94);
  const l=document.createElement("link"); l.rel="apple-touch-icon"; l.href=c.toDataURL("image/png"); document.head.appendChild(l);
}

/* ============================================================
   BOOT
   ============================================================ */
(async function init(){
  makeIcon();
  await openDB();
  await loadSettings();
  state.settings.tabs=migrateTabs(state.settings.tabs); await saveSettings();
  await maybeSeed();
  state.foods=await getAll("foods");
  state.log=await getAll("log");
  renderChartChips();
  render();
})();
</script>
